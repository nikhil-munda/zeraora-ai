version: '3.9'

services:
  # ─── MongoDB ──────────────────────────────────────────────────────────────────
  mongo:
    image: mongo:7
    container_name: on-ai-mongo
    restart: unless-stopped
    ports:
      - '27017:27017'
    volumes:
      - mongo-data:/data/db
    environment:
      MONGO_INITDB_DATABASE: on-ai
    healthcheck:
      test: ['CMD', 'mongosh', '--eval', "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── Backend ─────────────────────────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: ../docker/Dockerfile.backend
    container_name: on-ai-backend
    restart: unless-stopped
    ports:
      - '5000:5000'
    environment:
      PORT: 5000
      MONGODB_URI: mongodb://mongo:27017/on-ai
      JWT_SECRET: ${JWT_SECRET:-change_this_in_production_please}
      JWT_EXPIRES_IN: 7d
      NODE_ENV: production
      FRONTEND_URL: http://localhost:3000
    depends_on:
      mongo:
        condition: service_healthy
    healthcheck:
      test: ['CMD', 'wget', '-q', '--spider', 'http://localhost:5000/health']
      interval: 30s
      timeout: 10s
      retries: 3

  # ─── Frontend ─────────────────────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: ../docker/Dockerfile.frontend
    container_name: on-ai-frontend
    restart: unless-stopped
    ports:
      - '3000:3000'
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:5000
    depends_on:
      backend:
        condition: service_healthy

volumes:
  mongo-data:
    driver: local
